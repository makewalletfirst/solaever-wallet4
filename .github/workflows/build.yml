name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: |
          npm install --force --no-audit --no-fund

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate JS Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed --platform android --dev false --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: Build Android Debug APK
        run: |
          echo "Checking android directory content:"
          ls -F android/
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: solaever-wallet-v2.19
          path: android/app/build/outputs/apk/debug/app-debug.apk
